server:
  port: 8081

spring:
  application:
    name: trekmate-exe-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/exetrekmate
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ExeTrekMatePool
      minimum-idle: 2
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

logging:
  level:
    com.trekmate.exe: DEBUG
    org.hibernate.SQL: DEBUG
